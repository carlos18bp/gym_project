name: CI — Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────
  # Backend — pytest (Django + SQLite)
  # ───────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config default-libmysqlclient-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run pytest
        run: >
          pytest -v --tb=short
          --junitxml=test-results/results.xml
          --cov=gym_app
          --cov-branch
          --cov-report=term
          --cov-report=xml:test-results/coverage.xml

      - name: Backend test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Test Results
          path: backend/test-results/results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/test-results/results.xml
            backend/test-results/coverage.xml
          retention-days: 7

      - name: Write backend summary
        if: always()
        run: |
          echo "## Backend Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-results/results.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' test-results/results.xml | head -1 || echo "?")
            FAILURES=$(grep -oP 'failures="\K[0-9]+' test-results/results.xml | head -1 || echo "?")
            ERRORS=$(grep -oP 'errors="\K[0-9]+' test-results/results.xml | head -1 || echo "?")
            TIME=$(grep -oP 'time="\K[0-9.]+' test-results/results.xml | head -1 || echo "?")
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Tests | $TESTS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failures | $FAILURES |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Errors | $ERRORS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Duration | ${TIME}s |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No test results file found." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ───────────────────────────────────────────
  # Frontend — Jest unit & component tests
  # ───────────────────────────────────────────
  frontend-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run Jest tests
        run: npm test -- --ci --forceExit

  # ───────────────────────────────────────────
  # Frontend — Playwright E2E tests (sharded)
  # ───────────────────────────────────────────
  frontend-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/3", "2/3", "3/3"]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers with system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E tests (shard ${{ matrix.shard }})
        run: >
          npx playwright test
          --shard=${{ matrix.shard }}
          --workers=1
          --reporter=blob,junit
        env:
          CI: 'true'
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/e2e-results.xml

      - name: E2E test report (shard ${{ matrix.shard }})
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Results (shard ${{ matrix.shard }})
          path: frontend/test-results/e2e-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-${{ strategy.job-index }}
          path: frontend/blob-report/
          retention-days: 1

      - name: Upload test traces (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ strategy.job-index }}
          path: frontend/test-results/
          retention-days: 7

      - name: Write E2E shard summary
        if: always()
        working-directory: frontend
        run: |
          echo "## E2E Shard ${{ matrix.shard }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-results/e2e-results.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' test-results/e2e-results.xml | head -1 || echo "?")
            FAILURES=$(grep -oP 'failures="\K[0-9]+' test-results/e2e-results.xml | head -1 || echo "?")
            TIME=$(grep -oP 'time="\K[0-9.]+' test-results/e2e-results.xml | head -1 || echo "?")
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Tests | $TESTS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failures | $FAILURES |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Duration | ${TIME}s |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No JUnit results found for this shard." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ───────────────────────────────────────────
  # E2E — Merge blob reports into single HTML
  # ───────────────────────────────────────────
  e2e-merge-report:
    if: always()
    needs: frontend-e2e-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: frontend/all-blob-reports
          pattern: playwright-blob-*
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Write merged report summary
        run: |
          echo "## E2E Merged Report" >> "$GITHUB_STEP_SUMMARY"
          echo "📊 The full Playwright HTML report is available as the **playwright-report** artifact." >> "$GITHUB_STEP_SUMMARY"
          echo "Download it and open \`index.html\` to browse all test results." >> "$GITHUB_STEP_SUMMARY"
