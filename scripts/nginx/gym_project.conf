# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gmconsultoresjuridicos.com www.gmconsultoresjuridicos.com;
    return 301 https://www.gmconsultoresjuridicos.com$request_uri;
}

# Redirect bare domain to www (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name gmconsultoresjuridicos.com;

    ssl_certificate /etc/letsencrypt/live/www.gmconsultoresjuridicos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.gmconsultoresjuridicos.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.gmconsultoresjuridicos.com$request_uri;
}

# Main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.gmconsultoresjuridicos.com;

    ssl_certificate /etc/letsencrypt/live/www.gmconsultoresjuridicos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.gmconsultoresjuridicos.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Static files (served directly by Nginx, bypassing Django/Gunicorn)
    location /static/ {
        alias /home/ryzepeck/webapps/gym_project/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (user-uploaded content)
    location /media/ {
        alias /home/ryzepeck/webapps/gym_project/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else goes to Gunicorn via Unix socket
    location / {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/run/gym_intranet.sock;
        proxy_redirect off;
    }
}
